<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: file: asset:;" />
  <title>Terra Echo Labs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    /* Logo ring */
    .logo-ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2px solid #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .logo-ring::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: conic-gradient(#5eead4, #818cf8, #5eead4);
      animation: spin 3s linear infinite;
      z-index: 0;
    }
    .logo-ring::after {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: #0f0f0f;
      z-index: 1;
    }
    .logo-ring img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      position: relative;
      z-index: 2;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #5eead4 0%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 11px;
      color: #4b5563;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .status-line {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 14px;
      min-height: 18px;
      text-align: center;
      transition: color 0.3s ease;
    }
    .status-line.error {
      color: #ef4444;
    }

    /* Three bouncing dots */
    .dots {
      display: flex;
      gap: 7px;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #374151;
      animation: bounce 1.4s ease-in-out infinite;
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.22s; }
    .dot:nth-child(3) { animation-delay: 0.44s; }
    @keyframes bounce {
      0%, 60%, 100% { background: #374151; transform: translateY(0); }
      30% { background: #5eead4; transform: translateY(-5px); }
    }
    .dots.hidden { visibility: hidden; }

    .version {
      position: absolute;
      bottom: 14px;
      font-size: 11px;
      color: #1f2937;
    }
  </style>
</head>
<body>
  <div class="logo-ring">
    <img id="logo" src="" alt="" />
  </div>

  <h1>Terra Echo Labs</h1>
  <p class="subtitle">Music Production Intelligence Suite</p>

  <p class="status-line" id="status">Starting audio engine...</p>
  <div class="dots" id="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <p class="version">v1.0.0</p>

  <script>
    // Receive status updates from Electron main process via contextBridge
    window.loadingAPI.onStatus(({ message, error }) => {
      const el = document.getElementById('status')
      el.textContent = message
      if (error) {
        el.className = 'status-line error'
        document.getElementById('dots').className = 'dots hidden'
      }
    })

    // Set logo — path provided by main process via contextBridge
    window.loadingAPI.getLogoPath().then(logoPath => {
      if (logoPath) document.getElementById('logo').src = logoPath
    })
  </script>
</body>
</html>
